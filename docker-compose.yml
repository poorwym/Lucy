services:
  postgres:
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    container_name: lucy-postgres
    environment:
      POSTGRES_DB: lucy
      POSTGRES_USER: lucy
      POSTGRES_PASSWORD: lucy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lucy -d lucy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
